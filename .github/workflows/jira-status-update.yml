name: Update Jira Status

on:
  push:
    branches-ignore:
      - 'master'        # игнорируем мастер, работаем только с develop-ветками
  pull_request:
    types: [opened, reopened, synchronize, converted_to_draft, ready_for_review, closed]
    branches:
      - develop         # только PR, которые вливаются в develop

jobs:
  jira-transition:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira issue key
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            MESSAGE=$(git log -1 --pretty=%B)
          else
            MESSAGE="${{ github.event.pull_request.title }}"
          fi

          ISSUE_KEY=$(echo "$MESSAGE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "issue=$ISSUE_KEY" >> $GITHUB_OUTPUT

      - name: Stop if no Jira key
        if: steps.extract.outputs.issue == ''
        run: exit 0

      - name: Move to In Progress on first commit
        if: github.event_name == 'push'
        run: |
          curl -X POST \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} \
            -H "Content-Type: application/json" \
            --data '{"transition": {"id": "21"}}' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions

      - name: Move to In Review on PR open
        if: github.event.action == 'opened' || github.event.action == 'ready_for_review'
        run: |
          curl -X POST \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} \
            -H "Content-Type: application/json" \
            --data '{"transition": {"id": "31"}}' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions

      - name: Move back to In Progress on Draft
        if: github.event.action == 'converted_to_draft'
        run: |
          curl -X POST \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} \
            -H "Content-Type: application/json" \
            --data '{"transition": {"id": "21"}}' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions

      - name: Move to Done on Merge
        if: github.event.pull_request.merged == true
        run: |
          curl -X POST \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }} \
            -H "Content-Type: application/json" \
            --data '{"transition": {"id": "41"}}' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions
