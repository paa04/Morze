name: Team Speed Dashboard

on:
  push:
    branches: [main, develop, KAN-33-team-speed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect metrics
        run: bash metrics/collect.sh

      - name: Build dashboard
        run: bash metrics/build_dashboard.sh

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp metrics/team_speed_report.html _site/index.html

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
